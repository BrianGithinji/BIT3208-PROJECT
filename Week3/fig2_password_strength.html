<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fig 2: Password Strength Checker</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 400px; margin: 60px auto; }
        input[type="password"] { width: 100%; padding: 8px; font-size: 1rem; box-sizing: border-box; }
        #strength-bar { height: 8px; width: 0%; margin-top: 8px; border-radius: 4px; transition: width 0.3s, background 0.3s; }
        #strength-label { margin-top: 6px; font-size: 0.9rem; font-weight: bold; }
        ul { font-size: 0.85rem; color: #555; padding-left: 18px; margin-top: 10px; }
        ul li.met { color: green; }
    </style>
</head>
<body>
    <h2>Password Strength Checker</h2>
    <label for="password">Enter Password:</label><br><br>
    <input type="password" id="password" placeholder="Type your password...">
    <div id="strength-bar"></div>
    <div id="strength-label"></div>
    <ul>
        <li id="req-length">At least 8 characters</li>
        <li id="req-upper">At least one uppercase letter</li>
        <li id="req-lower">At least one lowercase letter</li>
        <li id="req-number">At least one number</li>
        <li id="req-special">At least one special character (!@#$%^&*)</li>
    </ul>

    <script>
        const input = document.getElementById("password");
        const bar   = document.getElementById("strength-bar");
        const label = document.getElementById("strength-label");

        const rules = {
            "req-length":  pwd => pwd.length >= 8,
            "req-upper":   pwd => /[A-Z]/.test(pwd),
            "req-lower":   pwd => /[a-z]/.test(pwd),
            "req-number":  pwd => /[0-9]/.test(pwd),
            "req-special": pwd => /[!@#$%^&*]/.test(pwd)
        };

        const levels = [
            { label: "",         color: "",        width: "0%" },
            { label: "Weak",     color: "#e74c3c", width: "25%" },
            { label: "Fair",     color: "#e67e22", width: "50%" },
            { label: "Good",     color: "#f1c40f", width: "75%" },
            { label: "Strong",   color: "#2ecc71", width: "90%" },
            { label: "Very Strong", color: "#27ae60", width: "100%" }
        ];

        input.addEventListener("input", () => {
            const pwd = input.value;
            let score = 0;

            for (const [id, test] of Object.entries(rules)) {
                const el = document.getElementById(id);
                const passed = test(pwd);
                el.classList.toggle("met", passed);
                if (passed) score++;
            }

            const level = levels[score];
            bar.style.width      = level.width;
            bar.style.background = level.color;
            label.textContent    = pwd.length ? `Strength: ${level.label}` : "";
            label.style.color    = level.color;
        });
    </script>
</body>
</html>
